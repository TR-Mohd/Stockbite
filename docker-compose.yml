version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stockbite_db
    environment:
      POSTGRES_USER: stockbite_user
      POSTGRES_PASSWORD: stockbite_password
      POSTGRES_DB: stockbite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
